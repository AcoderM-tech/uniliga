# conf.d/default.conf — faqat server{} bloki bo'lishi kerak
# map{}, upstream{}, set_real_ip_from — bular asosiy nginx.conf da bo'ladi
# Lekin nginx:alpine da /etc/nginx/nginx.conf http{} ichida conf.d/*.conf ni include qiladi
# Shuning uchun map{} va upstream{} ni ham shu yerda yozsa bo'ladi — ular http{} kontekstida ishlaydi

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream django_asgi {
    server backend:8000;
    keepalive 32;
}

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name acoderm.uz www.acoderm.uz _;

    root  /usr/share/nginx/html;
    index index.html;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size     200M;
    client_body_buffer_size  128k;
    server_tokens            off;

    sendfile         on;
    tcp_nopush       on;
    tcp_nodelay      on;
    keepalive_timeout 65;

    real_ip_header    CF-Connecting-IP;
    set_real_ip_from  0.0.0.0/0;
    real_ip_recursive on;

    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;

    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://www.youtube.com https://s.ytimg.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https: https://i.ytimg.com; media-src 'self' blob: data: https:; connect-src 'self' https://acoderm.uz https://www.acoderm.uz wss://acoderm.uz wss://www.acoderm.uz https://static.cloudflareinsights.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://youtube.com; worker-src 'self' blob:; child-src 'self' blob: https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"
        always;

    add_header X-Content-Type-Options  "nosniff"   always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "0"          always;

    # ── 1) WebSocket ──────────────────────────────────────────────────────────
    location ~ ^/(jonli|oyin|taktika)(/|$) {
        proxy_pass         http://django_asgi;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Origin            "https://$host";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── 2) Backend API ────────────────────────────────────────────────────────
    location ~ ^/(api|django-admin|swagger|redoc|static-django)(/|$) {
        proxy_pass         http://django_asgi;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── 3) Media fayllar ──────────────────────────────────────────────────────
    location /media/ {
        root /app;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Access-Control-Allow-Origin  "*"            always;
        add_header Cache-Control "public, max-age=2592000" always;
        expires 30d;
        access_log off;
    }

    # ── 4) Static assets (Vite build) ─────────────────────────────────────────
    location ~* ^/assets/.+\.(js|mjs|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|avif|ico|wasm|map)$ {
        expires    1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # ── 5) SPA fallback ───────────────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}